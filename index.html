<script>
(function() {
    var WMS_BASE = 'https://opengeo.ncep.noaa.gov/geoserver/conus/conus_cref_qcd/ows';

    function refreshRadar() {
        fetch(WMS_BASE + '?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetCapabilities')
            .then(function(r) { return r.text(); })
            .then(function(xml) {
                var m = xml.match(/<Extent name="time"[^>]*default="([^"]+)"/);
                var currentTime = m ? m[1] : null;
                if (window._radarLayer) {
                    // Layer already exists (auto-refresh tick) -- just swap the
                    // WMS TIME param in place, no need to recreate the layer.
                    window._radarLayer.setParams({ time: currentTime || undefined });
                } else {
                    window._radarLayer = L.tileLayer.wms(WMS_BASE, {
                        layers: 'conus_cref_qcd',
                        format: 'image/png',
                        transparent: true,
                        version: '1.1.1',
                        opacity: 0.6,
                        zIndex: 500,
                        time: currentTime || undefined,
                        attribution: 'NOAA/NCEP'
                    });
                    // Radar view is the default view, so add immediately.
                    window._radarLayer.addTo(window['map_45a6f355c670816133af869b055b2744']);
                }
                window._radarFrameLabel = currentTime
                    ? 'Radar frame: ' + new Date(currentTime).toLocaleString()
                    : 'Radar frame unavailable';
                var readout = document.getElementById('status-readout');
                if (readout && window._currentView !== 'flood') { readout.innerHTML = window._radarFrameLabel; }
            })
            .catch(function(err) {
                console.error('NOAA WMS radar fetch failed', err);
                window._radarFrameLabel = '&#9888; Radar unavailable -- internet connection required';
                var readout = document.getElementById('status-readout');
                if (readout && window._currentView !== 'flood') { readout.innerHTML = window._radarFrameLabel; }
            });
    }

    refreshRadar();
    // NEXRAD composite reflectivity updates roughly every 5 minutes -- poll on
    // the same cadence so an open tab stays current without a manual reload.
    setInterval(refreshRadar, 5 * 60 * 1000);
})();
</script>
    
<script>
(function loadNWSZones() {
    var TAHC_URL = 'https://services1.arcgis.com/9Astik9VqLUMFtxK/arcgis/rest/services/NWS_Zones_and_Areas_PUBLIC_VIEW/FeatureServer/33/query?where=1%3D1&outFields=*&f=geojson&outSR=4326';
    window._bufferGroup   = L.featureGroup();
    window._infestedGroup = L.featureGroup();
    fetch(TAHC_URL)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            // Looked up lazily here (not captured at script-parse time): this
            // script tag runs before folium's own map-init script further down
            // the page, so window['map_45a6f355c670816133af869b055b2744'] would still be undefined if read
            // synchronously at the top of this IIFE.
            var map = window['map_45a6f355c670816133af869b055b2744'];
            var infested = { type:'FeatureCollection',
                features: data.features.filter(function(f) { return f.properties.zone_name === 1; }) };
            var buffer = { type:'FeatureCollection',
                features: data.features.filter(function(f) { return f.properties.zone_name === 2; }) };
            L.geoJSON(buffer, {
                style: function() { return { fillColor:'#f39c12', color:'#d68910', weight:1, fillOpacity:0.18 }; },
                onEachFeature: function(f, l) { l.bindTooltip('NWS Buffer / Surveillance Zone'); }
            }).addTo(window._bufferGroup);
            L.geoJSON(infested, {
                style: function() { return { fillColor:'#e74c3c', color:'#c0392b', weight:1.5, fillOpacity:0.40 }; },
                onEachFeature: function(f, l) { l.bindTooltip('NWS Infested Zone (TAHC)'); }
            }).addTo(window._infestedGroup);
            window._bufferGroup.addTo(map);
            window._infestedGroup.addTo(map);
            window._infestedGroup.bringToBack();
            window._bufferGroup.bringToBack();
        })
        .catch(function() {
            var map = window['map_45a6f355c670816133af869b055b2744'];
            var notice = L.control({ position: 'bottomright' });
            notice.onAdd = function() {
                var div = L.DomUtil.create('div');
                div.style.cssText = 'background:white;padding:8px 12px;border:1px solid #e74c3c;border-radius:4px;font-size:12px;color:#c0392b;box-shadow:1px 1px 4px rgba(0,0,0,.2);';
                div.innerHTML = '&#9888; NWS zone data unavailable -- internet connection required';
                return div;
            };
            notice.addTo(map);
        });
})();
</script>
    
<script>
(function loadFloodGauges() {
    var GAUGE_COLORS = {"major": "#8e44ad", "moderate": "#e74c3c", "minor": "#e67e22", "action": "#f1c40f", "no_flooding": "#27ae60", "low_threshold": "#795548", "not_defined": "#3498db", "obs_not_current": "#bdc3c7", "out_of_service": "#2c3e50"};
    var FALLBACK_COLOR = '#95a5a6';
    // Categories with no meaningful forecast (no NWS river-forecast model
    // point, or a stale/expired forecast) -- skip drawing an outer ring for
    // these rather than showing a misleading gray ring on ~85% of gauges.
    var NO_FORECAST_CATS = { fcst_not_current: true, not_defined: true, out_of_service: true };
    window._gaugeGroup = L.featureGroup();
    // NWS/NCEP ArcGIS gauge service -- server-side filterable and fast
    // (~400ms). The unfiltered NWPS REST API (api.water.noaa.gov/nwps/v1/gauges,
    // 12k+ national records) was tried first and proved unreliable (60s+
    // response times, intermittent 504s) -- this is the same underlying NWS
    // river-gauge dataset via a properly indexed ArcGIS MapServer instead.
    // Layer 0 = observed ("Current Stage"), layer 15 = full-forecast-period
    // worst case ("Predicted Stage") -- same two rings texasflood.org's own
    // gauge icon legend shows (inner dot = current, outer ring = predicted).
    var BASE = "https://mapservices.weather.noaa.gov/eventdriven/rest/services/water/riv_gauges/MapServer/";
    var OBS_URL  = BASE + "0/query?where=state%3D'TX'&outFields=*&f=geojson";
    var FCST_URL = BASE + "15/query?where=state%3D'TX'&outFields=*&f=geojson";

    function refreshGauges() {
        Promise.all([fetch(OBS_URL).then(function(r){return r.json();}), fetch(FCST_URL).then(function(r){return r.json();})])
        .then(function(results) {
            // Auto-refresh tick: clear and rebuild rather than diffing --
            // 721 markers redraw fast enough (~400ms fetch) that this is
            // simpler and cheap, and avoids stale markers for gauges that
            // dropped out of service between refreshes.
            window._gaugeGroup.clearLayers();
            var obs = results[0], fcst = results[1];
            var fcstByLid = {};
            fcst.features.forEach(function(f) { fcstByLid[f.properties.gaugelid] = f.properties; });
            obs.features.forEach(function(f) {
                var p = f.properties;
                var cat = p.status || 'not_defined';
                var color = GAUGE_COLORS[cat] || FALLBACK_COLOR;
                var name = p.location + (p.waterbody ? ' (' + p.waterbody + ')' : '');
                var label = '<b>' + name + '</b><br>Current: ' + cat.replace(/_/g, ' ') +
                    (p.observed ? ' (' + p.observed + ' ' + (p.units || '') + ')' : '') +
                    '<br><i>' + (p.obstime || '') + '</i>';

                var fp = fcstByLid[p.gaugelid];
                if (fp) {
                    var fcat = fp.status || 'fcst_not_current';
                    if (!NO_FORECAST_CATS[fcat]) {
                        var fcolor = GAUGE_COLORS[fcat] || FALLBACK_COLOR;
                        L.circleMarker([p.latitude, p.longitude], {
                            radius: 8,
                            color: fcolor,
                            weight: 2,
                            fill: false,
                            opacity: 0.9
                        }).addTo(window._gaugeGroup);
                        label += '<br>Predicted: ' + fcat.replace(/_/g, ' ') +
                            (fp.forecast ? ' (' + fp.forecast + ' ' + (fp.units || '') + ')' : '') +
                            (fp.fcsttime ? '<br><i>Forecast for ' + fp.fcsttime + '</i>' : '');
                    }
                }

                L.circleMarker([p.latitude, p.longitude], {
                    radius: 4.5,
                    color: '#333',
                    weight: 1,
                    fillColor: color,
                    fillOpacity: 0.9
                }).bindPopup(label).bindTooltip(name, { sticky: true }).addTo(window._gaugeGroup);
            });
            window._gaugeStatusLabel = obs.features.length + ' TX gauges loaded (National Weather Service)';
            var status = document.getElementById('status-readout');
            if (status && window._currentView === 'flood') { status.innerHTML = window._gaugeStatusLabel; }
        })
        .catch(function(err) {
            console.error('NOAA gauge fetch failed', err);
            window._gaugeStatusLabel = '&#9888; Gauge data unavailable -- internet connection required';
            var status = document.getElementById('status-readout');
            if (status && window._currentView === 'flood') { status.innerHTML = window._gaugeStatusLabel; }
        });
    }

    refreshGauges();
    // River gauge readings/forecasts don't change as fast as radar sweeps,
    // but re-poll on the same 5-minute cadence for simplicity and so an open
    // tab never drifts far behind reality during an active flood event.
    setInterval(refreshGauges, 5 * 60 * 1000);
})();
</script>

<script>
window._currentView = 'radar';
(function() {
    function apply(view) {
        var map = window['map_45a6f355c670816133af869b055b2744'];
        if (!map || !window._radarLayer || !window._gaugeGroup) { setTimeout(function() { apply(view); }, 200); return; }
        window._currentView = view;
        var buttons = document.querySelectorAll('.view-btn');
        buttons.forEach(function(b) {
            var active = b.getAttribute('data-view') === view;
            b.style.background = active ? '#dd5928' : '#eee';
            b.style.color = active ? '#fff' : '#333';
        });
        var gaugeLegend = document.getElementById('gauge-legend');
        var status = document.getElementById('status-readout');
        if (view === 'radar') {
            map.removeLayer(window._gaugeGroup);
            window._radarLayer.addTo(map);
            if (gaugeLegend) { gaugeLegend.style.display = 'none'; }
            if (status) { status.innerHTML = window._radarFrameLabel || 'Loading radar…'; }
        } else {
            map.removeLayer(window._radarLayer);
            window._gaugeGroup.addTo(map);
            if (gaugeLegend) { gaugeLegend.style.display = 'block'; }
            if (status) { status.innerHTML = window._gaugeStatusLabel || 'Loading TX gauges…'; }
        }
    }
    document.querySelectorAll('.view-btn').forEach(function(btn) {
        btn.addEventListener('click', function() { apply(btn.getAttribute('data-view')); });
    });
})();
</script>

                // gauges back to front after any toggle change.
                if (window._gaugeGroup && map.hasLayer(window._gaugeGroup)) {

            apply();
        });
    });
})();
